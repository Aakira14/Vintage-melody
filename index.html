<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href=.pixelify-sans-<uniquifier>
    <title>Vintage Music Player</title>
    <link rel="stylesheet" href="design.css">
    <title>Document</title>
</head>
<body>
    <div class="player-wrapper">
        <div class="music-player" id="musicPlayer">
            <div class="title-bar">
                <span class="title-text">🎵 Back to 90s♡</span>
                <div class="window-controls">
                    <div class="control-btn minimize-btn" onclick="minimizePlayer()" title="Minimize">_</div>
                    <div class="control-btn close-btn" onclick="closePlayer()" title="Close">×</div>
                </div>
            </div>
            
            <div class="player-content">
                <div class="display">
                    <img id="displayImage" src="../songs and images/Agar_tum_na_hote.jpeg" alt="Agar Tum Na Hote" class="display-image">
                </div>
                <div class="song-title" id="songTitle"></div>

                <div class="controls">
                    <div class="player-btn" onclick="previousTrack()" title="Previous">⏮</div>
                    <div class="player-btn" onclick="togglePlay()" id="playBtn" title="Play/Pause">▶</div>
                    <div class="player-btn" onclick="nextTrack()" title="Next">⏭</div>
                </div>
                
                <div class="timeline-section">
                    <div class="progress-bar" onclick="seek(event)">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                    </div>
                    <div class="status-indicator" id="statusLight"></div>
                </div>
                
                <div class="eq-bars">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
            </div>
        </div>
    </div>
    <audio id="audioPlayer" preload="metadata"></audio>

    <script src="song.js"></script>
    
</body>
</html>
